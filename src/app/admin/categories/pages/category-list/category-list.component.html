<div class="d-flex justify-content-between align-items-center mb-3">
  <h1>Categories</h1>
  <a routerLink="new" class="btn btn-primary">New category</a>
</div>

@if (loading$ | async) {
  <p>Loading...</p>
}

@if (categoriesResponse$ | async; as response) {
  <table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (category of response.data; track category.id) {
        <tr>
          <td>{{ category.id }}</td>
          <td>{{ category.name }}</td>
          <td>{{ category.description }}</td>
          <td>
            <a [routerLink]="[category.id]" class="btn btn-sm btn-outline-secondary">Edit</a>
            <button type="button" class="btn btn-sm btn-outline-danger" (click)="remove(category.id)">Delete</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
}
