<div class="modal-backdrop" (click)="cancel()"></div>

<div class="modal-dialog">
  <h2>Adjust stock</h2>
  <p>Product #{{ productId }} / Warehouse #{{ warehouseId }}</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label">Quantity delta (positive or negative)</label>
      <input type="number" class="form-control" formControlName="quantity" />
    </div>

    <div class="mb-3">
      <label class="form-label">Comment</label>
      <input class="form-control" formControlName="comment" />
    </div>

    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Apply</button>
    </div>
  </form>
</div>
